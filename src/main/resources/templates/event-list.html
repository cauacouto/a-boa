<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: content">
<section class="page">
    <div class="page-header">
        <h1>Eventos</h1>
        <a class="btn primary" th:href="@{/eventos/novo}">➕ Novo evento</a>
    </div>

    <div th:if="${eventos != null and #lists.isEmpty(eventos)}" class="empty">
        <p>Nenhum evento cadastrado.</p>
    </div>

    <div class="cards" th:if="${eventos != null}">
        <div class="card" th:each="evento,iterStat : ${eventos}">
            <div class="card-body">
                <h2 th:text="${evento.nome}">Nome do Evento</h2>
                <p class="meta">
                    <span th:text="${evento.local}">Local</span>
                    •
                    <time th:text="${#temporals.format(evento.data, 'dd/MM/yyyy')}">20/11/2025</time>
                </p>
                <p th:text="${evento.descricao}">Descrição do evento</p>

            </div>

            <div class="card-actions">
                <a class="btn" th:href="@{|/eventos/editar/${evento.id}|}">Editar</a>

                <!-- Delete form: Spring expects DELETE; se usar HiddenHttpMethodFilter, o _method funciona -->
                <form th:id="'deleteForm' + ${iterStat.index}" th:action="@{|/eventos/${evento.id}|}" method="post" style="display:inline;">
                    <input type="hidden" name="_method" value="delete"/>
                    <button type="button" class="btn danger" th:onclick="'confirmDelete(\'deleteForm' + ${iterStat.index} + '\', \'' + ${evento.nome} + '\')'">Remover</button>
                </form>
            </div>
        </div>
    </div>
</section>
</html>
